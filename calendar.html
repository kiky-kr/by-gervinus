<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<style>
  :root{
    --ink:#1D1D1F; --sub:#8A8A8E; --hair:#F1F1F2; --sun:#F0453A; --sat:#0A84FF;
    --blue:#2F80ED; --face:#F2F2F7; --chip:#EFEFF4;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro","Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--face);font-family:var(--font);color:var(--ink);
    -webkit-font-smoothing:antialiased;}
  button{font-family:inherit;color:inherit;}
  #phone{max-width:430px;margin:0 auto;background:#fff;height:100vh;position:relative;overflow:hidden;
    display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.04);}
  /* header */
  .hd{padding:14px 18px 10px;}
  .hd-row{display:flex;align-items:center;justify-content:space-between;}
  .rbtn{width:40px;height:40px;border-radius:50%;background:var(--face);border:none;display:grid;place-items:center;cursor:pointer;font-size:18px;line-height:1;}
  #btn-add{font-size:27px;font-weight:300;padding-bottom:2px;}
  .gbtn{width:34px;height:34px;border-radius:8px;background:transparent;border:none;display:grid;place-items:center;cursor:pointer;}
  .mtitle{font-size:19px;font-weight:700;letter-spacing:-.3px;min-width:118px;text-align:center;}
  .wk{display:grid;grid-template-columns:repeat(7,1fr);margin-top:14px;}
  .wk div{text-align:center;font-size:12.5px;font-weight:600;color:var(--sub);padding-bottom:2px;}
  .wk .s{color:var(--sun);} .wk .a{color:var(--sat);}
  /* grid */
  #cal{flex:1;min-height:0;display:flex;flex-direction:column;border-top:1px solid var(--hair);touch-action:none;}
  .week{flex:1;min-height:0;position:relative;display:grid;grid-template-columns:repeat(7,1fr);}
  .weekbars{position:absolute;top:33px;left:0;right:0;pointer-events:none;z-index:5;
    display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:17px;}
  .mbar{height:15px;line-height:15px;font-size:9.5px;font-weight:600;border-radius:4px;
    letter-spacing:-.2px;padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:clip;text-align:left;
    box-sizing:border-box;margin:0 4px 0 3px;}
  .mbar.lastcol{margin-right:3px;}   /* 마지막 열엔 구분선이 없음 */
  .cell{min-height:0;overflow:hidden;text-align:left;border:none;border-bottom:1px solid var(--hair);
    border-right:1px solid var(--hair);background:#fff;padding:6px 3px 4px 3px;cursor:pointer;display:flex;
    flex-direction:column;gap:3px;user-select:none;}
  .cell.edge{border-right:none;}
  .cell.out{opacity:.5;}
  .cell.sel{background:#EEF4FF;}
  .num{font-size:13.5px;font-weight:500;width:24px;height:24px;line-height:24px;text-align:center;
    border-radius:50%;align-self:center;flex:none;}
  .num.today{background:#000;color:#fff;font-weight:700;}
  .items{display:flex;flex-direction:column;gap:2px;overflow:hidden;padding-top:0;}
  .pill{height:15px;line-height:15px;font-size:9.5px;font-weight:600;border-radius:4px;padding:0 4px;
    white-space:nowrap;overflow:hidden;text-overflow:clip;letter-spacing:-.2px;box-sizing:border-box;}
  .tline{display:flex;align-items:center;gap:3px;height:15px;font-size:9.5px;white-space:nowrap;overflow:hidden;
    letter-spacing:-.2px;padding:0 1px 0 0;box-sizing:border-box;}
  .tnm{overflow:hidden;white-space:nowrap;text-overflow:clip;min-width:0;}
  .tnm.fade{-webkit-mask-image:linear-gradient(to right,#000 calc(100% - 7px),transparent 100%);
                    mask-image:linear-gradient(to right,#000 calc(100% - 7px),transparent 100%);}
  .tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;border:1.3px solid var(--sat);}
  .tline.done{color:#C0C0C5;text-decoration:line-through;} .tline.done .tdot{background:#C0C0C5;border-color:#C0C0C5;}
  .hol{height:15px;line-height:15px;font-size:9.5px;font-weight:600;color:var(--sun);white-space:nowrap;overflow:hidden;text-overflow:clip;}
  .more{height:15px;line-height:15px;font-size:9.5px;color:var(--sub);padding-left:2px;}
  /* sheet */
  .sheet{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;animation:up .22s ease;}
  @keyframes up{from{transform:translateY(14px);opacity:.4}to{transform:none;opacity:1}}
  .shd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--hair);}
  .shd h2{font-size:16px;font-weight:700;margin:0;}
  .txt-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:0 4px;}
  .body{flex:1;overflow-y:auto;padding:8px 18px 40px;}
  .fab{position:absolute;right:20px;bottom:24px;width:54px;height:54px;border-radius:50%;background:#000;
    border:none;display:grid;place-items:center;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.28);color:#fff;font-size:28px;}
  .sec-l{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.4px;padding:14px 2px 4px;}
  .row{display:flex;gap:10px;align-items:center;width:100%;padding:12px 2px;border-bottom:1px solid var(--hair);
    background:#fff;text-align:left;}
  .row.dragging{opacity:.4;}
  .handle{width:26px;flex-shrink:0;display:grid;place-items:center;cursor:grab;color:#C4C4C9;touch-action:none;}
  .bar{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0;}
  .rmain{flex:1;min-width:0;border:none;background:none;cursor:pointer;padding:0;text-align:left;}
  .rtitle{font-size:15px;font-weight:600;display:flex;align-items:center;gap:5px;}
  .rsub{font-size:12.5px;color:var(--sub);margin-top:1px;}
  .cbox{width:24px;height:24px;border-radius:50%;border:2px solid #C7C7CC;background:transparent;display:grid;
    place-items:center;flex-shrink:0;cursor:pointer;}
  .cbox.on{background:var(--sat);border-color:var(--sat);}
  .cattag{font-size:11px;font-weight:600;border-radius:5px;padding:1px 6px;}
  .rowwrap{position:relative;overflow:hidden;background:var(--sun);}
  .rowwrap .row{transition:transform .18s ease;will-change:transform;}
  .delbtn{position:absolute;top:0;right:0;bottom:0;width:80px;border:none;background:var(--sun);color:#fff;
    font-size:14px;font-weight:700;cursor:pointer;display:grid;place-items:center;}
  .prog{display:flex;align-items:center;gap:10px;padding:10px 2px 4px;}
  .prog .track{flex:1;height:6px;border-radius:3px;background:#EAEAEE;overflow:hidden;}
  .prog .fill{height:100%;background:var(--blue);transition:width .25s;}
  /* editor fields */
  .seg{display:flex;background:var(--chip);border-radius:10px;padding:3px;margin-bottom:16px;}
  .seg button{flex:1;padding:7px 0;font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer;
    background:transparent;color:var(--sub);}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12);}
  .title-in{width:100%;font-size:20px;font-weight:600;border:none;outline:none;padding:4px 0 14px;
    border-bottom:1px solid var(--hair);}
  .field{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--hair);}
  .field .lbl{font-size:15px;flex:1;}
  .in{font-size:15px;border:none;background:var(--chip);border-radius:8px;padding:6px 9px;font-family:inherit;color:var(--ink);}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{font-size:13px;font-weight:600;border:none;border-radius:16px;padding:6px 12px;cursor:pointer;
    background:var(--chip);color:var(--sub);}
  .sw{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
  .sw.on{border-color:var(--ink);outline:2px solid #fff;outline-offset:-4px;}
  .rseg{display:flex;background:var(--chip);border-radius:8px;padding:2px;flex-wrap:wrap;}
  .rseg button{padding:5px 10px;font-size:13px;font-weight:600;border:none;border-radius:6px;cursor:pointer;
    background:transparent;color:var(--sub);}
  .rseg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.12);}
  .memo{flex:1;font-size:15px;border:none;outline:none;resize:none;font-family:inherit;line-height:1.5;}
  .toggle{width:46px;height:28px;border-radius:14px;border:none;background:#E5E5EA;position:relative;cursor:pointer;transition:background .18s;}
  .toggle.on{background:#34C759;}
  .knob{position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;background:#fff;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .toggle.on .knob{left:20px;}
  .del{margin-top:20px;width:100%;padding:13px 0;border:none;border-radius:12px;background:#FFF0F0;color:var(--sun);
    font-size:15px;font-weight:600;cursor:pointer;}
  .hint{font-size:12px;color:var(--sub);margin-top:10px;line-height:1.5;}
  .search-in{width:100%;font-size:16px;padding:10px 14px;border:none;border-radius:10px;background:var(--chip);outline:none;margin-bottom:8px;}
  .empty{color:var(--sub);font-size:14px;text-align:center;padding:44px 0;}
  /* mini cal */
  .mini-wk{display:grid;grid-template-columns:repeat(7,1fr);margin:4px 0;}
  .mini-wk div{text-align:center;font-size:11px;color:var(--sub);}
  .mini{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .mc{aspect-ratio:1;border:none;background:none;border-radius:50%;font-size:14px;cursor:pointer;color:var(--ink);}
  .mc.out{color:#C7C7CC;} .mc.on{background:var(--blue);color:#fff;font-weight:700;}
  .repeat-ic{width:12px;height:12px;flex-shrink:0;}
</style>

<div id="phone">
  <div class="hd">
    <div class="hd-row">
      <button class="rbtn" id="btn-today" aria-label="오늘로">📅</button>
      <div style="display:flex;align-items:center;gap:2px;">
        <button class="gbtn" id="btn-prev" aria-label="이전 달">‹</button>
        <span class="mtitle" id="mtitle"></span>
        <button class="gbtn" id="btn-next" aria-label="다음 달">›</button>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="rbtn" id="btn-search" aria-label="검색">🔍</button>
        <button class="rbtn" id="btn-add" aria-label="추가">＋</button>
      </div>
    </div>
    <div id="sync" style="min-height:14px;font-size:11px;font-weight:600;text-align:center;padding-top:4px;"></div>
    <div class="wk" id="wk"></div>
  </div>
  <div id="cal"></div>
  <div id="overlays"></div>
</div>

<script>
/* ============================ 상수 ============================ */
const WEEK = ["일","월","화","수","목","금","토"];
const DAY = 86400000;

const COLORS = {
  coral:{bg:"#FCE5E2",fg:"#C0473B",dot:"#EC6A5E"},      // 빨강
  sky:{bg:"#E2EDFA",fg:"#2E6FC5",dot:"#4E92E4"},        // 파랑
  lavender:{bg:"#ECEAF6",fg:"#6155A6",dot:"#8B7DD0"},   // 보라
  amber:{bg:"#F9EAD5",fg:"#B0731F",dot:"#E19A34"},      // 노랑
  rose:{bg:"#FAE3EA",fg:"#C04E72",dot:"#E07698"},       // 분홍
  slate:{bg:"#EAEBEE",fg:"#5C616B",dot:"#949AA6"},      // 회색
  sage:{bg:"#E4F0E5",fg:"#3B8A54",dot:"#5FB077"},       // 초록
  teal:{bg:"#DDF1EF",fg:"#2C8C82",dot:"#3FB6AB"},       // 청록
  indigo:{bg:"#E6E9FB",fg:"#4351B8",dot:"#6272E0"},     // 남색
};
const COLOR_KEYS = Object.keys(COLORS);

const CATS = {
  "운동":{bg:"#FDE8E8",fg:"#C0392B"},
  "공부":{bg:"#E6EEFB",fg:"#2F6FC5"},
  "개인":{bg:"#F0EAF9",fg:"#6E4BA8"},
  "학교":{bg:"#FBEEDD",fg:"#B5731C"},
  "끼끼":{bg:"#FCE6F0",fg:"#C04E8A"},
  "기타":{bg:"#ECEDEF",fg:"#5C616B"},
};
const CAT_KEYS = Object.keys(CATS);
const REPEAT_LABEL = {none:"안 함",weekly:"매주",monthly:"매월",custom:"사용자 지정"};

/* ==================== 대한민국 공휴일 2026 ==================== */
const FIXED_HOL = {  // 매년 동일(양력)
  "01-01":"신정","03-01":"삼일절","05-05":"어린이날","06-06":"현충일",
  "08-15":"광복절","10-03":"개천절","10-09":"한글날","12-25":"성탄절",
};
const YEAR_HOL = {   // 연도별(음력/대체공휴일) — 2026 기준
  "2026-02-16":"설날","2026-02-17":"설날","2026-02-18":"설날",
  "2026-03-02":"대체공휴일","2026-05-24":"부처님오신날","2026-05-25":"대체공휴일",
  "2026-08-17":"대체공휴일",
  "2026-09-24":"추석","2026-09-25":"추석","2026-09-26":"추석","2026-09-28":"대체공휴일",
  "2026-10-05":"대체공휴일",
};
function holiday(d){
  const k = key(d), md = k.slice(5);
  return YEAR_HOL[k] || FIXED_HOL[md] || null;
}

/* ============================ 날짜 헬퍼 ============================ */
const pad = n => String(n).padStart(2,"0");
const key = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseKey = k => { const [y,m,dd]=k.split("-").map(Number); return new Date(y,m-1,dd); };
const sameDay = (a,b) => key(a)===key(b);
const addMonths = (d,n) => new Date(d.getFullYear(), d.getMonth()+n, 1);
const uid = () => Math.random().toString(36).slice(2,10);
const dayLabel = d => `${d.getMonth()+1}월 ${d.getDate()}일 ${WEEK[d.getDay()]}요일`;
const minDate = (a,b) => a<=b ? a : b;
const maxDate = (a,b) => a>=b ? a : b;

function monthGrid(base){
  const first = new Date(base.getFullYear(), base.getMonth(), 1);
  const start = new Date(first); start.setDate(1 - first.getDay());
  return Array.from({length:42},(_,i)=>{ const d=new Date(start); d.setDate(start.getDate()+i); return d; });
}

/* 반복/기간을 고려해 항목이 날짜 d 를 덮는지 */
function occursOn(it, d){
  const start = parseKey(it.startDate);
  const end = parseKey(it.endDate || it.startDate);
  const span = Math.round((end - start)/DAY);            // 0 이상
  if(it.repeat === "custom") return (it.customDates||[]).includes(key(d));
  if(it.repeat === "none") return d>=start && d<=end;
  const diff = Math.floor((d - start)/DAY);
  if(diff < 0) return false;
  if(it.repeat === "weekly") return (diff % 7) <= span;
  if(it.repeat === "monthly"){
    for(const off of [0,-1]){
      const os = new Date(d.getFullYear(), d.getMonth()+off, start.getDate());
      if(os < start) continue;
      const oe = new Date(os); oe.setDate(oe.getDate()+span);
      if(d>=os && d<=oe) return true;
    }
    return false;
  }
  return false;
}
const isDone = (t,dk) => (t.doneDates||[]).includes(dk);

/* ============================ 상태/저장 ============================ */
let state = { items:[], cursor:new Date(2026,6,1) };
const today = new Date();

function seed(){
  const dk="2026-07-09"; let o=0;
  const mk=(x)=>({allDay:true,start:"09:00",end:"10:00",repeat:"none",customDates:[],doneDates:[],memo:"",category:"기타",order:-1,startDate:dk,endDate:dk,...x});
  return [
    mk({id:uid(),type:"event",title:"의활스터디",color:"lavender",category:"학교",allDay:false,start:"10:00",end:"11:30"}),
    mk({id:uid(),type:"event",title:"의활스터디",color:"lavender",category:"학교",allDay:false,start:"14:00",end:"15:30"}),
    mk({id:uid(),type:"todo",title:"머신러닝",color:"sky",category:"공부"}),
    mk({id:uid(),type:"todo",title:"상체",color:"coral",category:"운동",repeat:"weekly",memo:"주 3회 목표"}),
    mk({id:uid(),type:"todo",title:"테시트",color:"sage",category:"공부"}),
    mk({id:uid(),type:"todo",title:"파이썬공부",color:"indigo",category:"공부"}),
  ];
}
function migrate(items){
  return (items||[]).map((x,i)=>({
    allDay:true,start:"09:00",end:"10:00",repeat:"none",customDates:[],doneDates:[],
    memo:"",category:"기타",color:"coral",order:-1,
    startDate:x.startDate||x.date, endDate:x.endDate||x.date, ...x,
  }));
}
/* ▼▼▼ 구글 시트 연동: Apps Script 웹앱 배포 URL을 아래 따옴표 안에 붙여넣으면 자동 동기화됩니다. ▼▼▼ */
const SHEET_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwsmtydiGomXZdFBo7Y8GO11ceAJkyHIWR5BzgteFphjwRClw1bzwYD4vgbEE9hDvQYkw/exec";
/* ▲▲▲ 비워두면 이 기기(브라우저)에만 저장됩니다. ▲▲▲ */

let sheetLoaded=false;   // 시트를 정상적으로 읽었을 때만 쓰기 허용

async function load(){
  if(SHEET_WEBAPP_URL){
    // 시트가 원본. 읽기 성공 전에는 로컬 캐시/샘플로 시작하지 않는다.
    try{
      const r=await fetch(SHEET_WEBAPP_URL+"?t="+Date.now());
      const j=await r.json();
      if(Array.isArray(j)){
        state.items=migrate(j); sheetLoaded=true;
        setSync("ok",`시트 불러옴 (${j.length}개)`);
        return;
      }
      setSync("err","시트 오류: "+((j&&j.error)||"형식 이상"));
    }catch(e){ setSync("err","시트 읽기 실패 — 저장이 잠겨 있습니다"); }
    state.items=[];         // 시트를 못 읽으면 빈 화면 (캐시로 시트를 덮지 않음)
    return;
  }
  try{ const r=await window.storage.get("cal:v2"); if(r){ state.items=migrate(JSON.parse(r.value)); return; } }catch(e){}
  state.items = seed();
}

/* 시트에서 다시 불러오기 */
async function reloadFromSheet(){
  if(!SHEET_WEBAPP_URL) return;
  setSync("warn","불러오는 중…");
  await load();
  render(); if(openDayKey) renderDay();
}

/* 시트에 쓰기: 변경된 항목(행)만 전송 */
async function pushToSheet(payload){
  const body=JSON.stringify(payload);
  try{
    const r=await fetch(SHEET_WEBAPP_URL,{method:"POST",redirect:"follow",
      headers:{"Content-Type":"text/plain;charset=utf-8"},body});
    const j=await r.json();
    if(j && j.ok){
      if(j.action==="delete") return setSync("ok","삭제됨");
      if(j.action==="upsert") return setSync("ok",`저장됨 (수정 ${j.updated}, 추가 ${j.added})`);
      return setSync("ok",`저장됨 (${j.saved}행)`);
    }
    return setSync("err","스크립트 오류: "+(j.error||"알 수 없음"));
  }catch(e){
    try{ await fetch(SHEET_WEBAPP_URL,{method:"POST",mode:"no-cors",body}); }
    catch(e2){ return setSync("err","전송 실패(네트워크/차단)"); }
  }
  try{
    const r=await fetch(SHEET_WEBAPP_URL+"?debug=1&t="+Date.now());
    const j=await r.json();
    if(j && j.ok) return setSync("ok",`저장됨 (${j.rows}행)`);
    return setSync("err","검증 실패: "+(j&&j.error||""));
  }catch(e){ return setSync("warn","전송함(확인 불가·CORS)"); }
}

function setSync(kind,msg){
  const el2=document.getElementById("sync"); if(!el2) return;
  el2.textContent=msg;
  el2.style.color = kind==="ok"?"#2C8C82" : kind==="warn"?"#B0731F" : "var(--sun)";
  clearTimeout(setSync._t);
  if(kind==="ok") setSync._t=setTimeout(()=>{el2.textContent="";},2500);
}

/* payload 예: {action:"upsert",items:[it]} / {action:"delete",id} */
async function persist(payload){
  if(SHEET_WEBAPP_URL){
    if(!sheetLoaded){ setSync("err","시트를 못 읽어 저장을 막았습니다. 새로고침하세요."); render(); return; }
    setSync("warn","저장 중…"); pushToSheet(payload);
  }else{

  }

}

/* 기본 정렬: 1) 여러 날 막대 일정  2) 시간 미설정(하루 종일)  3) 시간 이른 순
   단, 사용자가 드래그로 순서를 바꾸면 그 순서(ord)가 최우선으로 유지된다. */
function isMultiDay(it){
  const s=it.startDate, e=it.endDate||it.startDate;
  if(it.repeat==="custom") return false;
  return e>s;
}
function rank(it){ return isMultiDay(it) ? 0 : (it.allDay ? 1 : 2); }
function hasOrd(it){ return typeof it.order==="number" && it.order>=0; }
function sortDay(a,b){
  // 둘 다 사용자가 정한 순서가 있으면 그것만 따른다
  if(hasOrd(a) && hasOrd(b)) return a.order-b.order;
  if(hasOrd(a)!==hasOrd(b)) return hasOrd(a) ? -1 : 1;   // 지정된 것이 위로
  const ra=rank(a), rb=rank(b);
  if(ra!==rb) return ra-rb;
  if(ra===2){
    const t=(a.start||"").localeCompare(b.start||"");
    if(t) return t;
  }
  return 0;
}
/* 특정 날짜의 항목 (정렬 포함) */
function dayItems(dk){
  const d = parseKey(dk);
  const evs = state.items.filter(x=>x.type==="event" && occursOn(x,d));
  const tds = state.items.filter(x=>x.type==="todo"  && occursOn(x,d));
  return { events:evs.sort(sortDay), todos:tds.sort(sortDay) };
}
/* 12시간제 표기 */
function fmtTime(t){
  if(!t) return "";
  const [h,m]=t.split(":").map(Number);
  const ap = h<12 ? "오전" : "오후";
  let hh = h%12; if(hh===0) hh=12;
  return `${ap} ${hh}:${pad(m)}`;
}
function timeRange(it){ return `${fmtTime(it.start)} – ${fmtTime(it.end)}`; }

const $ = s => document.querySelector(s);

/* 이번 달에 필요한 주(week)만 계산 → 빈 주 없이 화면을 꽉 채움 */
function monthWeeks(base){
  const first=new Date(base.getFullYear(),base.getMonth(),1);
  const start=new Date(first); start.setDate(1-first.getDay());
  const dim=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();
  const rows=Math.ceil((first.getDay()+dim)/7);
  const weeks=[];
  for(let r=0;r<rows;r++){ const wk=[]; for(let c=0;c<7;c++){ const d=new Date(start); d.setDate(start.getDate()+r*7+c); wk.push(d);} weeks.push(wk); }
  return weeks;
}
/* 한 주 안에서 연속 일정(막대)과 단일 일정을 배치 */
function layoutWeek(week){
  const runs=[], singleByCol={};
  state.items.filter(x=>x.type==="event").forEach(ev=>{
    const cols=[]; for(let c=0;c<7;c++) if(occursOn(ev,week[c])) cols.push(c);
    let i=0;
    while(i<cols.length){
      let j=i; while(j+1<cols.length && cols[j+1]===cols[j]+1) j++;
      const s=cols[i], e=cols[j];
      if(e>s) runs.push({start:s,end:e,ev});
      else (singleByCol[s]=singleByCol[s]||[]).push(ev);
      i=j+1;
    }
  });
  runs.sort((a,b)=> a.start-b.start || (b.end-b.start)-(a.end-a.start));
  const slotEnd=[];
  runs.forEach(r=>{ let s=0; while(slotEnd[s]!=null && slotEnd[s]>=r.start) s++; r.slot=s; slotEnd[s]=r.end; });
  // 열마다 실제로 막대가 덮는 높이만 확보 (막대에 포함되지 않은 날은 밀리지 않음)
  const colBand=Array(7).fill(0);
  runs.forEach(r=>{ for(let c=r.start;c<=r.end;c++) colBand[c]=Math.max(colBand[c], r.slot+1); });
  return {runs, slots:slotEnd.length, colBand, singleByCol};
}
const ROW_H = 17;   // 알약/할일 한 줄이 차지하는 높이(+gap)
const NUM_H = 33;   // 셀 위 여백(6) + 날짜 숫자(24) + 간격(3)

function render(){
  $("#mtitle").textContent = `${state.cursor.getFullYear()}년 ${state.cursor.getMonth()+1}월`;

  weeks.forEach(week=>{
    const {runs,colBand,singleByCol}=layoutWeek(week);
    const wkEl=el("div","week");

    week.forEach((d,c)=>{
      const inMonth=d.getMonth()===state.cursor.getMonth();
      const isToday=sameDay(d,today);

      cell.appendChild(num);

      const bandH=colBand[c]*ROW_H;                 // 이 요일이 막대에 덮인 만큼만
      const box=el("div","items"); if(bandH) box.style.marginTop=bandH+"px";
      box.dataset.band=bandH;

/* 렌더 후 셀 높이를 측정해 최대한 많은 항목을 표시 */
function fillCells(){
  requestAnimationFrame(()=>{
    document.querySelectorAll(".cell").forEach(cell=>{
      const box=cell.querySelector(".items"); if(!box) return;
      const dk=cell.dataset.dk, d=parseKey(dk);
      const band=Number(box.dataset.band)||0;
      const avail = cell.clientHeight - NUM_H - band - 4;
      let cap = Math.max(1, Math.floor(avail / ROW_H));

      const hol=holiday(d);
      const {events,todos}=dayItems(dk);
      const singles=events.filter(e=>!isSpanRun(e,d));
      const all=[]; if(hol) all.push({_hol:hol});
      singles.forEach(e=>all.push(e)); todos.forEach(t=>all.push(t));

      // 한 칸이 모자라면 "+N개" 자리를 확보
      let show = all.length<=cap ? all.length : Math.max(0,cap-1);

      box.innerHTML="";
      all.slice(0,show).forEach(it=>{
        if(it._hol){ box.appendChild(el("div","hol",it._hol)); return; }
        if(it.type==="event"){
          const cc=COLORS[it.color]; const p=el("div","pill",escapeHtml(it.title));
          p.style.color=cc.fg; p.style.background=cc.bg; box.appendChild(p);
        }else{
          const done=isDone(it,dk); const line=el("div","tline"+(done?" done":""));
          const dot=el("span","tdot");
          if(!done) dot.style.borderColor=COLORS[it.color].dot;   // 할일도 선택한 색으로
          const nm=el("span","tnm",escapeHtml(it.title));
          line.appendChild(dot); line.appendChild(nm); box.appendChild(line);
        }
      });
      if(all.length>show) box.appendChild(el("div","more",`+${all.length-show}개`));
      // 칸 밖으로 넘쳐 잘리는 할일 제목에만 얇은 페이드
      box.querySelectorAll(".tnm").forEach(nm=>{
        nm.classList.toggle("fade", nm.scrollWidth > nm.clientWidth + 1);
      });
    });
  });
}
/* 그 주에 막대(연속 일정)로 그려지는 일정인지 */
function isSpanRun(ev,d){
  const prev=new Date(d), next=new Date(d);
  prev.setDate(d.getDate()-1); next.setDate(d.getDate()+1);
  const inWeekPrev = d.getDay()>0 && occursOn(ev,prev);
  const inWeekNext = d.getDay()<6 && occursOn(ev,next);
  return inWeekPrev || inWeekNext;
}

/* ============================ 드래그로 기간 생성 ============================ */
let drag=null;
function cellFromPoint(x,y){
  const e=document.elementFromPoint(x,y);
  return e && e.closest ? e.closest(".cell") : null;
}
function markRange(aDk,bDk){
  const a=parseKey(aDk), b=parseKey(bDk); const lo=minDate(a,b), hi=maxDate(a,b);
  document.querySelectorAll(".cell").forEach(c=>{
    const d=parseKey(c.dataset.dk); c.classList.toggle("sel", d>=lo && d<=hi);
  });
}
function clearRange(){ document.querySelectorAll(".cell.sel").forEach(c=>c.classList.remove("sel")); }

$("#cal").addEventListener("pointerdown",e=>{
  if($("#overlays").childElementCount) return;      // 시트 열려있으면 무시
  const c=cellFromPoint(e.clientX,e.clientY); if(!c) return;
  drag={anchor:c.dataset.dk, cur:c.dataset.dk, moved:false};
  markRange(drag.anchor,drag.cur);
});
document.addEventListener("pointermove",e=>{
  if(!drag) return;
  const c=cellFromPoint(e.clientX,e.clientY); if(!c) return;
  if(c.dataset.dk!==drag.cur){ drag.cur=c.dataset.dk; drag.moved = drag.moved || drag.cur!==drag.anchor; markRange(drag.anchor,drag.cur); }
});
document.addEventListener("pointerup",()=>{
  if(!drag) return; const {anchor,cur,moved}=drag; drag=null; clearRange();
  if(moved && anchor!==cur){
    const a=parseKey(anchor), b=parseKey(cur);
    openEditor(newItem(key(minDate(a,b)), key(maxDate(a,b))));
  }else{
    openDay(anchor);
  }
});

/* 행을 감싸고 "왼쪽으로 밀면 삭제" 동작을 붙인다 */
function wrapRow(row,id){
  const wrap=el("div","rowwrap"); wrap.dataset.id=id;
  const del=el("button","delbtn","삭제");
  del.onclick=(ev)=>{ ev.stopPropagation(); removeItem(id); if(openDayKey) renderDay(); };
  wrap.appendChild(del); wrap.appendChild(row);

  const OPEN=-80; let x0=null, dx=0, open=false, active=false;
  const setX=v=>{ row.style.transform=`translateX(${v}px)`; };
  row.addEventListener("pointerdown",e=>{
    if(e.target.closest(".handle")) return;      // 순서 변경 핸들과 충돌 방지
    x0=e.clientX; dx=0; active=true; row.style.transition="none";
  });
  row.addEventListener("pointermove",e=>{
    if(!active||x0===null) return;
    dx=e.clientX-x0;
    let v=(open?OPEN:0)+dx;
    if(v>0) v=0; if(v<OPEN) v=OPEN+(v-OPEN)/4;   // 끝에서 저항감
    setX(v);
  });
  const finish=()=>{
    if(!active) return; active=false; row.style.transition="";
    const shouldOpen = open ? dx<40 : dx<-30;
    open=shouldOpen; setX(open?OPEN:0); x0=null;
  };
  row.addEventListener("pointerup",finish);
  row.addEventListener("pointercancel",finish);
  row.addEventListener("pointerleave",()=>{ if(active) finish(); });
  return wrap;
}
function spanText(it){
  if((it.endDate||it.startDate)===it.startDate) return "";
  const s=parseKey(it.startDate), e=parseKey(it.endDate);
  return `  ·  ${s.getMonth()+1}/${s.getDate()}~${e.getMonth()+1}/${e.getDate()}`;
}
function escapeHtml(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function toggleTodo(id,dk){
  const it=state.items.find(x=>x.id===id); if(!it) return;
  const has=(it.doneDates||[]).includes(dk);
  it.doneDates = has ? it.doneDates.filter(x=>x!==dk) : [...(it.doneDates||[]),dk];
  persist({action:"upsert",items:[it]}); if(openDayKey) renderDay();
}

/* ============================ 순서 변경(드래그) ============================ */
function enableReorder(listEl,type){
  let dragEl=null, rows=[];
  listEl.querySelectorAll(".handle").forEach(h=>{
    h.addEventListener("pointerdown",e=>{
      e.preventDefault(); e.stopPropagation();
      dragEl=h.closest(".rowwrap"); if(!dragEl) return;
      dragEl.classList.add("dragging");
      rows=[...listEl.querySelectorAll(".rowwrap")];
      const move=ev=>{
        const y=ev.clientY; let placed=false;
        for(const r of rows){ if(r===dragEl) continue;
          const rc=r.getBoundingClientRect();
          if(y < rc.top+rc.height/2){ listEl.insertBefore(dragEl,r); placed=true; break; } }
        if(!placed) listEl.appendChild(dragEl);
      };
      const up=()=>{
        document.removeEventListener("pointermove",move);
        dragEl.classList.remove("dragging");
        // 화면에 보이는 순서를 그대로 ord 로 저장 (사용자 지정 순서)
        const changed=[];
        [...listEl.querySelectorAll(".rowwrap")].forEach((r,i)=>{
          const it=state.items.find(x=>x.id===r.dataset.id);
          if(it && it.order!==i){ it.order=i; changed.push(it); }
        });
        if(changed.length){ persist({action:"upsert",items:changed}); renderDay(); }
      };
      document.addEventListener("pointermove",move);
      document.addEventListener("pointerup",up,{once:true});
    });
  });
}

  });
  const cfw=el("div"); cfw.style.padding="13px 0"; cfw.style.borderBottom="1px solid var(--hair)";
  cfw.appendChild(el("div",null,"카테고리")).style.cssText="font-size:13px;color:var(--sub);margin-bottom:8px;";
  cfw.appendChild(chips); body.appendChild(cfw);

  // 날짜 (시작/종료)
  body.appendChild(dateField("시작 날짜", it.startDate, v=>{ it.startDate=v; if(parseKey(it.endDate)<parseKey(v)) it.endDate=v; }));
  body.appendChild(dateField("종료 날짜", it.endDate||it.startDate, v=>{ it.endDate=v; }));

  // 하루 종일 + 시간 (일정·할일 공통)
  const af=el("div","field"); af.appendChild(fieldLabel("하루 종일"));
  af.appendChild(toggleEl(it.allDay,()=>{it.allDay=!it.allDay;rerender();})); body.appendChild(af);
  if(!it.allDay){
    const tf=el("div","field"); tf.appendChild(fieldLabel("시간"));
    const wrap=el("div"); wrap.style.cssText="display:flex;align-items:center;gap:6px;";
    const s=timeInput(it.start,v=>it.start=v), e=timeInput(it.end,v=>it.end=v);
    wrap.appendChild(s); wrap.appendChild(el("span",null,"–")); wrap.appendChild(e);
    tf.appendChild(wrap); body.appendChild(tf);
  }

  // 색상 (공통)
  const colf=el("div","field"); colf.appendChild(fieldLabel("색상"));
  const sws=el("div"); sws.style.cssText="display:flex;gap:9px;flex-wrap:wrap;";
  COLOR_KEYS.forEach(c=>{
    const b=el("button","sw"+(it.color===c?" on":"")); b.style.background=COLORS[c].dot;
    b.onclick=()=>{it.color=c;rerender();}; sws.appendChild(b);
  });
  colf.appendChild(sws); body.appendChild(colf);

  // 반복
  const rf=el("div","field"); rf.appendChild(fieldLabel("반복"));
  const rseg=el("div","rseg");
  Object.keys(REPEAT_LABEL).forEach(r=>{
    const b=el("button",it.repeat===r?"on":"",REPEAT_LABEL[r]);
    b.onclick=()=>{ it.repeat=r; rerender(); }; rseg.appendChild(b);
  });
  rf.appendChild(rseg); body.appendChild(rf);
  if(it.repeat==="custom"){
    const cf2=el("div","field"); cf2.appendChild(fieldLabel(`선택한 날짜 ${it.customDates.length}개`));
    const pick=el("button","chip","날짜 선택"); pick.onclick=()=>openMiniCal(it,rerender);
    cf2.appendChild(pick); body.appendChild(cf2);
  }

  // 메모
  const mf=el("div"); mf.style.cssText="display:flex;gap:12px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--hair);";
  const memo=el("textarea","memo"); memo.rows=3; memo.value=it.memo; memo.placeholder="메모 추가";
  memo.oninput=e=>it.memo=e.target.value; mf.appendChild(memo); body.appendChild(mf);

  if(it.repeat!=="none" && it.repeat!=="custom")
    body.appendChild(el("div","hint","반복 항목은 시작일부터 계속 표시돼요. 수정·삭제는 전체 반복에 적용됩니다."));

  if(!isNew){
    const del=el("button","del","🗑  삭제"); del.onclick=()=>{ removeItem(it.id); closeTop(); if(openDayKey) renderDay(); };
    body.appendChild(del);
  }
}
function fieldLabel(t){ return el("span","lbl",t); }
function dateField(label,val,onChange){
  const f=el("div","field"); f.appendChild(fieldLabel(label));
  const i=el("input"); i.type="date"; i.className="in"; i.value=val; i.onchange=e=>onChange(e.target.value);
  f.appendChild(i); return f;
}
function timeInput(val,onChange){ const i=el("input"); i.type="time"; i.className="in"; i.value=val; i.onchange=e=>onChange(e.target.value); return i; }
function toggleEl(on,onClick){ const t=el("button","toggle"+(on?" on":"")); t.appendChild(el("span","knob")); t.onclick=onClick; return t; }

/* 사용자 지정 반복 — 미니 캘린더 */
function openMiniCal(it,after){
  let cur=parseKey(it.startDate); cur=new Date(cur.getFullYear(),cur.getMonth(),1);
  const sel=new Set(it.customDates);
  const sheet=el("div");
  const right=el("button","txt-btn","완료"); right.style.color="var(--sat)"; right.style.fontWeight="700";
  right.onclick=()=>{ it.customDates=[...sel].sort(); closeTop(); after&&after(); };
  sheet.appendChild(sheetHeader("반복할 날짜 선택",{right}));
  const body=el("div","body"); sheet.appendChild(body);
  const nav=el("div"); nav.style.cssText="display:flex;align-items:center;justify-content:space-between;padding:4px 0 8px;";
  const prev=el("button","gbtn","‹"), next=el("button","gbtn","›"), lbl=el("span",null,"");
  lbl.style.cssText="font-size:16px;font-weight:700;"; nav.append(prev,lbl,next); body.appendChild(nav);
  const wk=el("div","mini-wk"); WEEK.forEach(w=>wk.appendChild(el("div",null,w))); body.appendChild(wk);
  const grid=el("div","mini"); body.appendChild(grid);
  const info=el("div","hint",""); body.appendChild(info);
  function draw(){
    lbl.textContent=`${cur.getFullYear()}년 ${cur.getMonth()+1}월`; grid.innerHTML="";
    monthGrid(cur).forEach(d=>{
      const dk=key(d), inM=d.getMonth()===cur.getMonth();
      const b=el("button","mc"+(inM?"":" out")+(sel.has(dk)?" on":""),String(d.getDate()));
      b.onclick=()=>{ if(sel.has(dk))sel.delete(dk); else sel.add(dk); info.textContent=`${sel.size}개 선택됨`; draw(); };
      grid.appendChild(b);
    });
    info.textContent=`${sel.size}개 선택됨`;
  }
  prev.onclick=()=>{cur=addMonths(cur,-1);draw();}; next.onclick=()=>{cur=addMonths(cur,1);draw();};
  draw(); openSheet(sheet);
}

/* CRUD */
function upsert(it){
  const i=state.items.findIndex(x=>x.id===it.id);
  if(i>=0) state.items[i]=it; else state.items.push(it);
  persist({action:"upsert",items:[it]});     // 해당 행만 기록
}
function removeItem(id){
  state.items=state.items.filter(x=>x.id!==id);
  persist({action:"delete",id});             // 해당 행만 삭제
}

/* ============================ 검색 ============================ */
function openSearch(){
  const sheet=el("div"); sheet.appendChild(sheetHeader("검색"));
  const body=el("div","body"); sheet.appendChild(body);
  const inp=el("input","search-in"); inp.placeholder="일정·할일 검색"; body.appendChild(inp);
  const res=el("div"); body.appendChild(res);
  inp.oninput=()=>{
    const q=inp.value.trim().toLowerCase(); res.innerHTML="";
    if(!q) return;
    const hits=state.items.filter(x=>(x.title+" "+(x.memo||"")).toLowerCase().includes(q))
      .sort((a,b)=>a.startDate.localeCompare(b.startDate));
    if(!hits.length){ res.appendChild(el("div","empty","결과가 없어요.")); return; }
    hits.forEach(it=>{
      const row=el("div","row"); const bar=el("div","bar");
      bar.style.background=it.type==="event"?COLORS[it.color].dot:"var(--sat)";
      const main=el("button","rmain");
      const d=parseKey(it.startDate);
      main.appendChild(el("div","rtitle",escapeHtml(it.title)));
      main.appendChild(el("div","rsub",`${d.getMonth()+1}월 ${d.getDate()}일 · ${it.type==="event"?"일정":"할일"}${it.repeat!=="none"?" · "+REPEAT_LABEL[it.repeat]:""}`));
      main.onclick=()=>{ closeTop(); openEditor({...it}); };
      row.appendChild(bar); row.appendChild(main); res.appendChild(row);
    });
  };
  openSheet(sheet); inp.focus();
}
